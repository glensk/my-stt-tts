name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-test:
    # macOS arm64: the only runner that exercises the Apple-Silicon MLX path.
    # Heavy ML extras are NOT installed; tests cover pure logic with audio mocked.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
      - name: Sync (core + dev only)
        run: uv sync
      - name: Ruff format check
        run: uv run ruff format --check .
      - name: Ruff lint
        run: uv run ruff check .
      - name: Mypy
        run: uv run mypy src
      - name: Pytest
        run: uv run pytest -q
