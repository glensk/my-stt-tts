<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="440" viewBox="0 0 1280 440" role="img" aria-label="my-stt-tts — talk to your Mac, it talks back">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0e16"/>
      <stop offset="0.55" stop-color="#0f1422"/>
      <stop offset="1" stop-color="#0b1018"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7cc4ff"/>
      <stop offset="0.5" stop-color="#22e7ff"/>
      <stop offset="1" stop-color="#ff5cc8"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22e7ff" stop-opacity="0.25"/>
      <stop offset="0.5" stop-color="#22e7ff"/>
      <stop offset="1" stop-color="#ff5cc8"/>
    </linearGradient>
    <radialGradient id="glowc" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#22e7ff" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#22e7ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowm" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ff5cc8" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#ff5cc8" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1280" height="440" fill="url(#bg)"/>
  <circle cx="250" cy="150" r="360" fill="url(#glowc)"/>
  <circle cx="1080" cy="330" r="320" fill="url(#glowm)"/>

  <!-- subtle scanline grid -->
  <g stroke="#22e7ff" stroke-opacity="0.05" stroke-width="1">
    <line x1="0" y1="88" x2="1280" y2="88"/>
    <line x1="0" y1="176" x2="1280" y2="176"/>
    <line x1="0" y1="264" x2="1280" y2="264"/>
    <line x1="0" y1="352" x2="1280" y2="352"/>
  </g>

  <!-- prompt mark -->
  <text x="96" y="150" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="40" fill="#3df0a6" font-weight="700">&#9656;_</text>

  <!-- product name -->
  <text x="150" y="158" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="78" font-weight="800" fill="url(#title)" letter-spacing="-2">my-stt-tts</text>

  <!-- tagline -->
  <text x="98" y="218" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="33" font-weight="600" fill="#e6e9ef">Talk to your Mac. It talks back.</text>

  <!-- sub-tagline -->
  <text x="98" y="262" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="20" font-weight="400" fill="#9fb0c8">A private, local voice assistant for Apple&#160;Silicon &#183; German &#183; French &#183; English</text>

  <!-- voice waveform -->
  <g transform="translate(98,330)" fill="url(#wave)">
    <rect x="0"   y="-8"  width="7" height="16" rx="3.5"/>
    <rect x="16"  y="-22" width="7" height="44" rx="3.5"/>
    <rect x="32"  y="-40" width="7" height="80" rx="3.5"/>
    <rect x="48"  y="-15" width="7" height="30" rx="3.5"/>
    <rect x="64"  y="-52" width="7" height="104" rx="3.5"/>
    <rect x="80"  y="-30" width="7" height="60" rx="3.5"/>
    <rect x="96"  y="-60" width="7" height="120" rx="3.5"/>
    <rect x="112" y="-38" width="7" height="76" rx="3.5"/>
    <rect x="128" y="-20" width="7" height="40" rx="3.5"/>
    <rect x="144" y="-48" width="7" height="96" rx="3.5"/>
    <rect x="160" y="-28" width="7" height="56" rx="3.5"/>
    <rect x="176" y="-12" width="7" height="24" rx="3.5"/>
    <rect x="192" y="-36" width="7" height="72" rx="3.5"/>
    <rect x="208" y="-18" width="7" height="36" rx="3.5"/>
    <rect x="224" y="-44" width="7" height="88" rx="3.5"/>
    <rect x="240" y="-24" width="7" height="48" rx="3.5"/>
    <rect x="256" y="-10" width="7" height="20" rx="3.5"/>
    <rect x="272" y="-32" width="7" height="64" rx="3.5"/>
    <rect x="288" y="-16" width="7" height="32" rx="3.5"/>
    <rect x="304" y="-26" width="7" height="52" rx="3.5"/>
    <rect x="320" y="-9"  width="7" height="18" rx="3.5"/>
  </g>

  <!-- right-side spoken-reply chip -->
  <g transform="translate(820,150)">
    <rect x="0" y="0" width="372" height="156" rx="16" fill="#0c1626" fill-opacity="0.78" stroke="#1c2940" stroke-width="1.5"/>
    <circle cx="34" cy="40" r="7" fill="#3dffa6"/>
    <text x="56" y="46" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="17" fill="#9cc0ff">you &#9656; "maziko, what's on today?"</text>
    <circle cx="34" cy="92" r="7" fill="#22e7ff"/>
    <text x="56" y="98" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="17" fill="#e6e9ef">assistant &#9612; speaking&#8230;</text>
    <g transform="translate(56,120)" fill="#22e7ff" fill-opacity="0.85">
      <rect x="0"  y="-6" width="5" height="12" rx="2.5"/>
      <rect x="11" y="-12" width="5" height="24" rx="2.5"/>
      <rect x="22" y="-9" width="5" height="18" rx="2.5"/>
      <rect x="33" y="-15" width="5" height="30" rx="2.5"/>
      <rect x="44" y="-7" width="5" height="14" rx="2.5"/>
      <rect x="55" y="-11" width="5" height="22" rx="2.5"/>
    </g>
    <text x="250" y="138" font-family="-apple-system, sans-serif" font-size="13" fill="#6b7a93">interrupt any time &#8617;</text>
  </g>

  <!-- bottom rule -->
  <rect x="0" y="436" width="1280" height="4" fill="url(#title)" opacity="0.85"/>
</svg>
