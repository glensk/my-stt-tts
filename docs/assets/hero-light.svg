<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="440" viewBox="0 0 1280 440" role="img" aria-label="my-stt-tts — talk to your Mac, it talks back">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f5f8ff"/>
      <stop offset="0.55" stop-color="#eef3fb"/>
      <stop offset="1" stop-color="#f3f0fb"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1f7fe0">
        <animate attributeName="offset" values="-0.4;0;-0.4" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="0.5" stop-color="#0bb7d4">
        <animate attributeName="offset" values="0.1;0.5;0.1" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="1" stop-color="#d6249f">
        <animate attributeName="offset" values="0.6;1;0.6" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0bb7d4" stop-opacity="0.35"/>
      <stop offset="0.5" stop-color="#0bb7d4"/>
      <stop offset="1" stop-color="#d6249f"/>
    </linearGradient>
    <radialGradient id="glowc" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#0bb7d4" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#0bb7d4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowm" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#d6249f" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#d6249f" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="440" fill="url(#bg)"/>
  <circle cx="250" cy="150" r="360" fill="url(#glowc)">
    <animate attributeName="r" values="360;380;360" dur="7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1080" cy="330" r="320" fill="url(#glowm)">
    <animate attributeName="r" values="320;342;320" dur="9s" repeatCount="indefinite"/>
  </circle>

  <!-- subtle grid -->
  <g stroke="#1f7fe0" stroke-opacity="0.05" stroke-width="1">
    <line x1="0" y1="88" x2="1280" y2="88"/>
    <line x1="0" y1="176" x2="1280" y2="176"/>
    <line x1="0" y1="264" x2="1280" y2="264"/>
    <line x1="0" y1="352" x2="1280" y2="352"/>
  </g>

  <!-- prompt mark (blinking cursor) -->
  <text x="96" y="150" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="40" fill="#12a766" font-weight="700">&#9656;_<animate attributeName="opacity" values="1;1;0.25;0.25;1" keyTimes="0;0.45;0.5;0.95;1" dur="1.2s" repeatCount="indefinite"/></text>

  <!-- product name -->
  <text x="150" y="158" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="78" font-weight="800" fill="url(#title)" letter-spacing="-2">my-stt-tts</text>

  <!-- tagline -->
  <text x="98" y="218" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="33" font-weight="600" fill="#0f1730">Talk to your Mac. It talks back.</text>

  <!-- sub-tagline -->
  <text x="98" y="262" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="20" font-weight="400" fill="#516079">A private, local voice assistant for Apple&#160;Silicon &#183; German &#183; French &#183; English</text>

  <!-- voice waveform (SMIL-animated bar heights) -->
  <g transform="translate(98,330)" fill="url(#wave)">
    <rect x="0"   y="-8"  width="7" height="16" rx="3.5"><animate attributeName="height" values="16;110;28;72;16" dur="1.45s" repeatCount="indefinite"/><animate attributeName="y" values="-8;-55;-14;-36;-8" dur="1.45s" repeatCount="indefinite"/></rect>
    <rect x="16"  y="-22" width="7" height="44" rx="3.5"><animate attributeName="height" values="44;96;20;64;44" dur="1.6s" repeatCount="indefinite"/><animate attributeName="y" values="-22;-48;-10;-32;-22" dur="1.6s" repeatCount="indefinite"/></rect>
    <rect x="32"  y="-40" width="7" height="80" rx="3.5"><animate attributeName="height" values="80;30;104;48;80" dur="1.35s" repeatCount="indefinite"/><animate attributeName="y" values="-40;-15;-52;-24;-40" dur="1.35s" repeatCount="indefinite"/></rect>
    <rect x="48"  y="-15" width="7" height="30" rx="3.5"><animate attributeName="height" values="30;88;46;112;30" dur="1.55s" repeatCount="indefinite"/><animate attributeName="y" values="-15;-44;-23;-56;-15" dur="1.55s" repeatCount="indefinite"/></rect>
    <rect x="64"  y="-52" width="7" height="104" rx="3.5"><animate attributeName="height" values="104;36;76;22;104" dur="1.4s" repeatCount="indefinite"/><animate attributeName="y" values="-52;-18;-38;-11;-52" dur="1.4s" repeatCount="indefinite"/></rect>
    <rect x="80"  y="-30" width="7" height="60" rx="3.5"><animate attributeName="height" values="60;118;34;90;60" dur="1.65s" repeatCount="indefinite"/><animate attributeName="y" values="-30;-59;-17;-45;-30" dur="1.65s" repeatCount="indefinite"/></rect>
    <rect x="96"  y="-60" width="7" height="120" rx="3.5"><animate attributeName="height" values="120;40;88;26;120" dur="1.5s" repeatCount="indefinite"/><animate attributeName="y" values="-60;-20;-44;-13;-60" dur="1.5s" repeatCount="indefinite"/></rect>
    <rect x="112" y="-38" width="7" height="76" rx="3.5"><animate attributeName="height" values="76;22;100;52;76" dur="1.38s" repeatCount="indefinite"/><animate attributeName="y" values="-38;-11;-50;-26;-38" dur="1.38s" repeatCount="indefinite"/></rect>
    <rect x="128" y="-20" width="7" height="40" rx="3.5"><animate attributeName="height" values="40;96;18;70;40" dur="1.58s" repeatCount="indefinite"/><animate attributeName="y" values="-20;-48;-9;-35;-20" dur="1.58s" repeatCount="indefinite"/></rect>
    <rect x="144" y="-48" width="7" height="96" rx="3.5"><animate attributeName="height" values="96;28;116;44;96" dur="1.42s" repeatCount="indefinite"/><animate attributeName="y" values="-48;-14;-58;-22;-48" dur="1.42s" repeatCount="indefinite"/></rect>
    <rect x="160" y="-28" width="7" height="56" rx="3.5"><animate attributeName="height" values="56;112;30;82;56" dur="1.62s" repeatCount="indefinite"/><animate attributeName="y" values="-28;-56;-15;-41;-28" dur="1.62s" repeatCount="indefinite"/></rect>
    <rect x="176" y="-12" width="7" height="24" rx="3.5"><animate attributeName="height" values="24;78;104;40;24" dur="1.47s" repeatCount="indefinite"/><animate attributeName="y" values="-12;-39;-52;-20;-12" dur="1.47s" repeatCount="indefinite"/></rect>
    <rect x="192" y="-36" width="7" height="72" rx="3.5"><animate attributeName="height" values="72;20;94;120;72" dur="1.36s" repeatCount="indefinite"/><animate attributeName="y" values="-36;-10;-47;-60;-36" dur="1.36s" repeatCount="indefinite"/></rect>
    <rect x="208" y="-18" width="7" height="36" rx="3.5"><animate attributeName="height" values="36;88;46;108;36" dur="1.56s" repeatCount="indefinite"/><animate attributeName="y" values="-18;-44;-23;-54;-18" dur="1.56s" repeatCount="indefinite"/></rect>
    <rect x="224" y="-44" width="7" height="88" rx="3.5"><animate attributeName="height" values="88;32;72;24;88" dur="1.44s" repeatCount="indefinite"/><animate attributeName="y" values="-44;-16;-36;-12;-44" dur="1.44s" repeatCount="indefinite"/></rect>
    <rect x="240" y="-24" width="7" height="48" rx="3.5"><animate attributeName="height" values="48;104;28;82;48" dur="1.6s" repeatCount="indefinite"/><animate attributeName="y" values="-24;-52;-14;-41;-24" dur="1.6s" repeatCount="indefinite"/></rect>
    <rect x="256" y="-10" width="7" height="20" rx="3.5"><animate attributeName="height" values="20;66;100;38;20" dur="1.49s" repeatCount="indefinite"/><animate attributeName="y" values="-10;-33;-50;-19;-10" dur="1.49s" repeatCount="indefinite"/></rect>
    <rect x="272" y="-32" width="7" height="64" rx="3.5"><animate attributeName="height" values="64;116;26;90;64" dur="1.4s" repeatCount="indefinite"/><animate attributeName="y" values="-32;-58;-13;-45;-32" dur="1.4s" repeatCount="indefinite"/></rect>
    <rect x="288" y="-16" width="7" height="32" rx="3.5"><animate attributeName="height" values="32;84;48;106;32" dur="1.54s" repeatCount="indefinite"/><animate attributeName="y" values="-16;-42;-24;-53;-16" dur="1.54s" repeatCount="indefinite"/></rect>
    <rect x="304" y="-26" width="7" height="52" rx="3.5"><animate attributeName="height" values="52;98;30;74;52" dur="1.46s" repeatCount="indefinite"/><animate attributeName="y" values="-26;-49;-15;-37;-26" dur="1.46s" repeatCount="indefinite"/></rect>
    <rect x="320" y="-9"  width="7" height="18" rx="3.5"><animate attributeName="height" values="18;60;94;34;18" dur="1.52s" repeatCount="indefinite"/><animate attributeName="y" values="-9;-30;-47;-17;-9" dur="1.52s" repeatCount="indefinite"/></rect>
  </g>

  <!-- right-side spoken-reply chip -->
  <g transform="translate(820,150)">
    <rect x="0" y="0" width="372" height="156" rx="16" fill="#ffffff" fill-opacity="0.85" stroke="#d8e0ee" stroke-width="1.5"/>
    <circle cx="34" cy="40" r="7" fill="#12a766">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <text x="56" y="46" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="17" fill="#1f7fe0">you &#9656; "maziko, what's on today?"</text>
    <circle cx="34" cy="92" r="7" fill="#0bb7d4">
      <animate attributeName="r" values="7;9;7" dur="1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.45;1" dur="1s" repeatCount="indefinite"/>
    </circle>
    <text x="56" y="98" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="17" fill="#0f1730">assistant &#9612; speaking&#8230;</text>
    <g transform="translate(56,120)" fill="#0bb7d4" fill-opacity="0.9">
      <rect x="0"  y="-6" width="5" height="12" rx="2.5"><animate attributeName="height" values="12;26;8;12" dur="0.7s" repeatCount="indefinite"/><animate attributeName="y" values="-6;-13;-4;-6" dur="0.7s" repeatCount="indefinite"/></rect>
      <rect x="11" y="-12" width="5" height="24" rx="2.5"><animate attributeName="height" values="24;8;30;24" dur="0.8s" repeatCount="indefinite"/><animate attributeName="y" values="-12;-4;-15;-12" dur="0.8s" repeatCount="indefinite"/></rect>
      <rect x="22" y="-9" width="5" height="18" rx="2.5"><animate attributeName="height" values="18;30;10;18" dur="0.65s" repeatCount="indefinite"/><animate attributeName="y" values="-9;-15;-5;-9" dur="0.65s" repeatCount="indefinite"/></rect>
      <rect x="33" y="-15" width="5" height="30" rx="2.5"><animate attributeName="height" values="30;12;24;30" dur="0.75s" repeatCount="indefinite"/><animate attributeName="y" values="-15;-6;-12;-15" dur="0.75s" repeatCount="indefinite"/></rect>
      <rect x="44" y="-7" width="5" height="14" rx="2.5"><animate attributeName="height" values="14;28;8;14" dur="0.7s" repeatCount="indefinite"/><animate attributeName="y" values="-7;-14;-4;-7" dur="0.7s" repeatCount="indefinite"/></rect>
      <rect x="55" y="-11" width="5" height="22" rx="2.5"><animate attributeName="height" values="22;10;30;22" dur="0.82s" repeatCount="indefinite"/><animate attributeName="y" values="-11;-5;-15;-11" dur="0.82s" repeatCount="indefinite"/></rect>
    </g>
    <text x="250" y="138" font-family="-apple-system, sans-serif" font-size="13" fill="#8493ab">interrupt any time &#8617;</text>
  </g>

  <!-- bottom rule -->
  <rect x="0" y="436" width="1280" height="4" fill="url(#title)" opacity="0.9"/>
</svg>
