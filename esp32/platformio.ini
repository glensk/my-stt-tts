; PlatformIO project for the M5Stack Atom Echo (ESP32-PICO) my-stt-tts satellite.
;
; It connects to WiFi, opens a WebSocket to a my-stt-tts server (native
; transport, default port 8770), streams the on-board SPM1423 PDM mic as
; 16 kHz mono int16-LE PCM upstream, plays TTS PCM downstream on the NS4168
; speaker, and shows status on the RGB LED. Matches clients/PROTOCOL.md exactly.
;
; Build & flash:   pio run -t upload   (then: pio device monitor)
; See README.md for the full flashing walkthrough and wiring notes.

[platformio]
default_envs = m5stack-atom

[env:m5stack-atom]
platform = espressif32@6.9.0
board = m5stack-atom
framework = arduino

; --- Serial monitor -------------------------------------------------------
monitor_speed = 115200
upload_speed = 1500000

; --- Dependencies (pinned) ------------------------------------------------
; - M5Atom + FastLED: board init + the single SK6812 status LED.
; - arduinoWebSockets: a WebSocket *client* (RFC 6455) with binary frame send.
; - ArduinoJson: build/parse the JSON `hello` / `ready` control frames.
lib_deps =
    m5stack/M5Atom@^0.1.2
    fastled/FastLED@^3.7.0
    links2004/WebSockets@^2.4.1
    bblanchon/ArduinoJson@^7.1.0

; --- Build flags ----------------------------------------------------------
; Credentials/server come from secrets.h (copy secrets.h.example -> secrets.h).
; You can also override them here without editing source, e.g.:
;   build_flags = -DWIFI_SSID='"myssid"' -DWIFI_PASS='"pw"' -DSERVER_HOST='"192.168.1.10"'
build_flags =
    -DCORE_DEBUG_LEVEL=1
